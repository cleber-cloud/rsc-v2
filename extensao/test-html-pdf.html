<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Teste HTML→PDF</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 1rem; }
    #status { white-space: pre-wrap; background: #f1f5f9; padding: 1rem; border-radius: 8px; }
    .ok { color: #008037; font-weight: 700; }
    .err { color: #b91c1c; font-weight: 700; }
  </style>
</head>
<body>
  <h1>Teste de conversão HTML→PDF</h1>
  <div id="status">Iniciando…</div>
  <script src="./vendor/html2canvas.min.js"></script>
  <script src="./vendor/jspdf.umd.min.js"></script>
  <script src="./html-para-pdf.js"></script>
  <script>
    (async function () {
      const status = document.getElementById("status");
      function log(m) { status.textContent += "\n" + m; console.log(m); }
      try {
        if (!window.html2canvas) throw new Error("html2canvas missing");
        if (!window.jspdf && !window.jsPDF) throw new Error("jsPDF missing");
        if (!window.RSCHtmlParaPdf) throw new Error("RSCHtmlParaPdf missing");

        // HTML semelhante ao requerimento (multi-página + imagem)
        const brasao = await fetch("../brasaodarepublica.png").then(r => r.blob()).then(b => new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.onerror=rej;fr.readAsDataURL(b);}));
        const logo = await fetch("../logo-uffs.png").then(r => r.blob()).then(b => new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.onerror=rej;fr.readAsDataURL(b);}));

        let longText = "";
        for (let i = 1; i <= 40; i++) {
          longText += `<p><strong>Parágrafo ${i}.</strong> Texto de teste com acentuação: avaliação, órgão, comissão, função, número, produção. Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>`;
        }

        const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><style>
          body{font-family:Times New Roman,serif;color:#111;background:#fff;padding:24px;}
          h1{text-align:center;font-size:18px;}
          .header{display:flex;align-items:center;gap:16px;justify-content:center;margin-bottom:20px;}
          .header img{height:70px;}
          table{width:100%;border-collapse:collapse;margin-top:12px;}
          th,td{border:1px solid #333;padding:6px;font-size:12px;}
          th{background:#eee;}
        </style></head><body>
          <div class="header">
            <img src="${brasao}" alt="brasao"/>
            <img src="${logo}" alt="logo"/>
          </div>
          <h1>REQUERIMENTO — RSC-PCCTAE (TESTE)</h1>
          <p>Nome: Fulano de Tal | SIAPE: 1234567</p>
          <table><thead><tr><th>Nº</th><th>Critério</th><th>Pontos</th></tr></thead>
          <tbody>
            <tr><td>1</td><td>Participação em comissão permanente</td><td>4,5</td></tr>
            <tr><td>2</td><td>Coordenação de projeto institucional</td><td>7,5</td></tr>
          </tbody></table>
          ${longText}
          <p><strong>FIM DO DOCUMENTO DE TESTE</strong></p>
        </body></html>`;

        log("Convertendo…");
        const t0 = performance.now();
        const bytes = await window.RSCHtmlParaPdf.htmlParaPdfBytes(html, {});
        const ms = Math.round(performance.now() - t0);
        const head = String.fromCharCode(bytes[0], bytes[1], bytes[2], bytes[3]);
        log("Tempo: " + ms + " ms");
        log("Tamanho: " + bytes.length + " bytes");
        log("Magic: " + head);
        if (head !== "%PDF") throw new Error("not a pdf");
        if (bytes.length < 20000) throw new Error("pdf too small: " + bytes.length);

        // download for manual inspection
        const blob = new Blob([bytes], { type: "application/pdf" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "teste-requerimento.pdf";
        a.click();

        log("OK_CONVERSAO");
        status.innerHTML += '<div class="ok">PASSOU</div>';
        document.title = "OK_CONVERSAO";
      } catch (e) {
        log("ERRO: " + (e && e.message ? e.message : e));
        status.innerHTML += '<div class="err">FALHOU</div>';
        document.title = "FAIL_CONVERSAO";
        console.error(e);
      }
    })();
  </script>
</body>
</html>
